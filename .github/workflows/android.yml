name: Build_VIP_APK

on:
  push:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Force Inject Map Keys
        # 直接在这里把你的 AK 写入环境，这是最稳妥的办法
        run: |
          echo "MAPS_API_KEY=WNrWOeRfLlxoc1PDXcHJnrtHRHwsvgB8" > local.properties
          echo "MAPS_SAFE_CODE=123456" >> local.properties
          chmod +x gradlew

      - name: Build Debug APK
        # 使用 assembleDebug 避开 release 签名的复杂报错
        run: ./gradlew assembleDebug -x lint -x test

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: VIP_Final_APK
          path: app/build/outputs/apk/debug/*.apk
